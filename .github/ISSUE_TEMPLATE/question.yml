name: "❓ Domanda / Supporto"
description: Fai una domanda o chiedi aiuto su DomenicoOS
title: "[QUESTION] "
labels: ["question"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ❓ **Domanda / Supporto - DomenicoOS**

        Hai un dubbio o ti serve aiuto? Scrivi qui!  
        Cerca di essere chiaro così possiamo aiutarti meglio 🚀

  - type: input
    id: version
    attributes:
      label: Versione di DomenicoOS (se rilevante)
      description: Inserisci la versione se la domanda riguarda qualcosa di specifico
      placeholder: "es. 1 Refine - build 1000"
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Tipo di domanda
      options:
        - Installazione
        - Avvio
        - T-Prompt
        - E-Shell
        - Bug dubbio
        - Altro
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: La tua domanda
      description: Scrivi qui la domanda nel modo più chiaro possibile
      placeholder: "Come faccio a...?"
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: Cosa hai già provato?
      description: Spiega cosa hai già tentato (se applicabile)
      placeholder: "Ho provato a..."
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshot / Video
      description: Facoltativo ma utile

  - type: textarea
    id: additional
    attributes:
      label: Informazioni aggiuntive
      description: Qualsiasi altro dettaglio utile
