name: "✨ Feature Request"
description: Suggerisci una nuova funzionalità per DomenicoOS
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ✨ **Richiesta funzionalità - DomenicoOS**

        Hai un’idea per migliorare DomenicoOS? Scrivila qui! 🚀  
        Più dettagli dai, più è facile valutarla e realizzarla.

  - type: input
    id: version
    attributes:
      label: Versione di DomenicoOS (se rilevante)
      description: Se la richiesta riguarda una versione specifica
      placeholder: "es. 1 Refine - build 1000"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area della funzionalità
      options:
        - Sistema generale
        - Interfaccia (UI)
        - T-Prompt
        - E-Shell
        - Performance
        - Altro
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: Descrizione della funzionalità
      description: Spiega bene cosa vuoi aggiungere
      placeholder: "Vorrei che DomenicoOS avesse..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problema che risolve
      description: Perché questa feature è utile?
      placeholder: "Questo aiuterebbe perché..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Soluzione proposta
      description: Come dovrebbe funzionare
      placeholder: "Potrebbe funzionare così..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative considerate
      description: Hai pensato ad altre soluzioni?
      placeholder: "Un'altra idea potrebbe essere..."
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Mockup / Screenshot
      description: Facoltativo ma molto utile

  - type: textarea
    id: additional
    attributes:
      label: Informazioni aggiuntive
      description: Altro che vuoi aggiungere
