name: "💥 Crash Report"
description: Segnala un crash (blocco totale) di DomenicoOS
title: "[CRASH] "
labels: ["crash", "bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        💥 **Crash Report - DomenicoOS**

        Se DomenicoOS si è bloccato o chiuso improvvisamente, compila questo modulo.  
        Più dettagli fornisci, più veloce sarà la risoluzione 🚀

  - type: input
    id: version
    attributes:
      label: Versione di DomenicoOS
      placeholder: "es. 1 Refine - build 1000"
    validations:
      required: true

  - type: input
    id: scratch_version
    attributes:
      label: Versione di Scratch
      placeholder: "es. 3.29.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Sistema operativo
      options:
        - Windows
        - macOS
        - Linux
        - Altro
    validations:
      required: true

  - type: textarea
    id: crash_description
    attributes:
      label: Cosa è successo?
      description: Descrivi il crash
      placeholder: "Il sistema si blocca quando..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Come riprodurre il crash
      placeholder: |
        1. Apri...
        2. Avvia...
        3. Boom 💥
    validations:
      required: true

  - type: textarea
    id: frequency
    attributes:
      label: Succede sempre?
      description: Il crash è ripetibile?
      placeholder: "Sempre / A volte / Solo una volta"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Messaggi / Errori visibili
      description: Eventuali messaggi a schermo (anche del T-Prompt)
      placeholder: "Scrivi qui eventuali errori..."

  - type: textarea
    id: last_action
    attributes:
      label: Ultima azione prima del crash
      placeholder: "Stavo facendo..."

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshot / Video
      description: Molto utili per capire il problema

  - type: textarea
    id: additional
    attributes:
      label: Informazioni aggiuntive
      description: Qualsiasi altro dettaglio utile
